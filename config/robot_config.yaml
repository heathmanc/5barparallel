# Verified 5-bar geometry — the design point from Claude.md §3, §5.
# DO NOT silently revert any of these values. They came out of a full
# kinematic design review and supersede the original spec draft.

geometry:
  l1_mm: 200.0            # proximal link (shoulder -> elbow)
  l2_mm: 230.0            # distal link   (elbow -> TCP)
  base_spacing_mm: 80.0   # 3.15 in, symmetric (narrowed by inverting L motor)

assembly:
  # Best-conditioned branch (Claude.md §3.4): left elbow "up", right "down".
  left_elbow: up
  right_elbow: down

joint_limits:
  min_deg: -20.0
  max_deg: 200.0

drivetrain:
  # A6 EtherCAT servo: 17-bit absolute encoder = 131072 counts per motor rev.
  # In CSP the drive position unit is one encoder count, so this is the raw
  # feedback resolution, not a microstep count. Confirm against the drive's
  # position factor / electronic gearing at bring-up (docs/ethercat_bringup.md).
  pulses_per_rev: 131072  # A6M80-750 17-bit encoder counts / motor rev
  belt_reduction: 3.0     # 3:1 GT3 (20T motor -> 60T shoulder)
  # pulses_per_degree = 131072 * 3 / 360 = 1092.2667 (derived, see config properties)

singularity:
  # Workspace guard thresholds (Claude.md §3.6, §9).
  parallel_min_deg: 20.0    # min degrees from the distal links being collinear
  serial_min_deg: 15.0      # min degrees from an arm being straight/folded
  reach_fraction_max: 0.85  # TCP distance / full reach (stiffness cap)

homing:
  # Home/limit switch reference — see docs/homing.md for the overhead figure.
  # The home flag is a small tab on the PROXIMAL link L1 (never L2) at
  # flag_radius_mm from the shoulder pivot; the switch mounts on a short base
  # bracket at the home trip angle and wires to the drive's homing digital input.
  # Both shoulders share the same trip angles. Mid-travel centre home
  # (TCP = home_tcp_mm). CiA 402 homing (mode 6) references to this switch and
  # zeros the drive there; the A6 absolute encoder then holds the datum.
  home_left_deg: 140.5406   # left shoulder angle at the home reference pose
  home_right_deg: 39.4594   # right shoulder angle at the home reference pose
  home_tcp_mm: [0.0, 250.0] # TCP these angles correspond to (informational)
  flag_radius_mm: 40.0      # tab radius on L1 (sensor bracket reaches to this)
  # Hard travel limits — mirror joint_limits above; wire the limit switches to
  # the drives' inputs and into the STO/E-stop safety chain.
  limit_min_deg: -20.0
  limit_max_deg: 200.0
