name: tests

# Test gate for the "commit straight to main" workflow: every push to main
# (and any PR) runs the full pytest suite. A red run is visible immediately on
# the commit, so a broken change never sits on main unnoticed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen   # PySide6 GUI tests run headless
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # PySide6 needs a few X/EGL runtime libs even in offscreen mode.
      - name: Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -q
